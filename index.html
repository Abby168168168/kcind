<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,Helvetica,sans-serif;scroll-behavior:smooth;}
section{padding:80px 10%;text-align:center;}
h1,h2{margin-bottom:20px;}
img{max-width:100%;display:block;margin:auto;}

.lang-toggle{
position:fixed;
top:20px;
right:20px;
z-index:1000;
}
.lang-toggle button{
padding:8px 15px;
margin-left:5px;
cursor:pointer;
border:none;
background:#000;
color:#fff;
}

.hero{
height:100vh;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.3)),
url("background.jpg") center/cover no-repeat;
}

.carousel{
overflow:hidden;
width:100%;
margin-top:30px;
}
.carousel-track{
display:flex;
animation:scroll 20s linear infinite;
}
.carousel-track img{
width:300px;
margin-right:20px;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}
.grid img{cursor:pointer;}

.lightbox{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}
.lightbox img{max-width:80%;max-height:80%;}
.lightbox.active{display:flex;}

footer{
background:#111;
color:#fff;
padding:40px;
text-align:center;
}

@media(max-width:768px){
section{padding:60px 8%;}
.hero h1{font-size:28px;}
}
</style>
</head>

<script>
function setLang(lang){
document.querySelectorAll("[data-en]").forEach(el=>{
el.textContent = el.getAttribute("data-"+lang);
});
}
setLang('en');

document.querySelectorAll(".grid img").forEach(img=>{
img.addEventListener("click",()=>{
document.querySelector(".lightbox img").src = img.src;
document.querySelector(".lightbox").classList.add("active");
});
});
</script>
